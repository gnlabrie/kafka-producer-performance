kafka-producer-test:
  security:
    mode: MTLS
    # Defaults point at kafka-dev client material under ./certs/kafka-dev/
    # Override with TRUSTSTORE_*/KEYSTORE_*/KEY_PASSWORD for non-local clusters.
    truststore-path: ${TRUSTSTORE_PATH:./certs/kafka-dev/client.truststore.jks}
    truststore-password: ${TRUSTSTORE_PASSWORD:kafkadev}
    truststore-type: ${TRUSTSTORE_TYPE:JKS}
    keystore-path: ${KEYSTORE_PATH:./certs/kafka-dev/client.keystore.jks}
    keystore-password: ${KEYSTORE_PASSWORD:kafkadev}
    keystore-type: ${KEYSTORE_TYPE:JKS}
    key-password: ${KEY_PASSWORD:kafkadev}
    # Empty disables hostname verification (matches kafka-dev broker config).
    # Set SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=https for production-like checks.
    endpoint-identification-algorithm: ${SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:}
